name: Website build and deploy

on:
  push:
    branches:
      - main # Deploy branch

  # Schedule for automatic deployment, once a day
  schedule:
    - cron: "42 3 * * *"

  # Run on PRs, but only build
  pull_request:
  # Allows to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-24.04
    # Set environment variables
    env:
      baseurl: waldorfkindergarten-konstanz.de
      virtualdir: /var/www/virtual/waldorfk/html
      uberspace_user: waldorfk
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive # Get submdules
          fetch-depth: 1 # Fetch all history for .GitInfo and .Lastmod

      - name: Create configuration for Matomo
        run: |
          mv static/config.php.sample static/config.php
          sed -i "s|__PIWIK_URL__|${{ secrets.MATOMO_PIWIK_URL }}|" static/config.php
          sed -i "s|__PROXY_URL__|https://${{ env.baseurl }}|" static/config.php
          sed -i "s|__TOKEN_AUTH__|${{ secrets.MATOMO_TOKEN_AUTH }}|" static/config.php

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: Build website with Hugo
        run: hugo -b https://${{ env.baseurl }}

      - name: Copy website to host
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ env.baseurl }}
          username: ${{ env.uberspace_user }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          timeout: 1m
          command_timeout: 2m
          target: ${{ env.virtualdir }}
          source: "public/*"
          rm: true
          strip_components: 1
        if: github.ref == 'refs/heads/main'
